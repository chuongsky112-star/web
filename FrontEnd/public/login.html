<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - ChemBet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- 
        QUAN TRỌNG: Tải file config.js để lấy APP_SECRET.
        File này phải được tải trước app_control.js để đảm bảo window.APP_SECRET tồn tại.
    -->
    <script src="/js/config.js" defer></script>
    <script src="/js/modules/app_control.js" defer></script>

</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h2 id="form-title">ĐĂNG NHẬP ĐI AE</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" placeholder="Nhập tên đăng nhập" required>
                </div>
                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                    <!-- Thêm icon để hiện/ẩn mật khẩu -->
                    <span id="toggle-password" class="password-toggle-icon">👁️</span>
                </div>
                <button type="submit" id="login-btn">Tiếp tục</button>
                <div id="login-message" class="message-box"></div>
            </form>
        </div>
        <div>
            <label>LIÊN HỆ TELE: @NOHUROIANHEM ĐỂ ĐƯỢC TẠO TÀI KHOẢN</label>
        </div>
    </div>
    <script src="/js/modules/login_ui.js" defer></script>

</body>

</html>
