<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không tìm thấy trang</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .container {
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            font-size: 5rem;
            margin-bottom: 0;
        }

        p {
            font-size: 1.5rem;
        }

        a.button-link {
            display: inline-block;
            padding: 12px 24px;
            margin-top: 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        a.button-link:hover {
            background-color: #0056b3;
        }
    </style>
    <!-- 
        QUAN TRỌNG: Tải file config.js để lấy APP_SECRET.
        File này phải được tải trước app_control.js để đảm bảo window.APP_SECRET tồn tại.
    -->
    <script src="/js/config.js" defer></script>
    <script src="/js/modules/app_control.js" defer></script>

</head>

<body>
    <div class="container">
        <h1>404</h1>
        <p>Rất tiếc, trang bạn đang tìm kiếm không tồn tại.</p>
        <a class="button-link" href="/login">Quay về trang đăng nhập</a>
    </div>
</body>

</html>
